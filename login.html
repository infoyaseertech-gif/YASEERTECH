<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>YaseerTech ERP — Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #0A2540 0%, #1a3a5c 50%, #0A2540 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .login-card {
      background: #fff;
      border-radius: 16px;
      padding: 48px 40px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 25px 60px rgba(0,0,0,0.3);
    }
    .login-logo {
      text-align: center;
      margin-bottom: 32px;
    }
    .login-logo img {
      height: 64px;
      object-fit: contain;
      margin-bottom: 12px;
    }
    .login-logo h1 {
      font-size: 22px;
      font-weight: 700;
      color: #0A2540;
    }
    .login-logo p {
      color: #64748b;
      font-size: 14px;
      margin-top: 4px;
    }
    h2 {
      font-size: 20px;
      color: #0A2540;
      margin-bottom: 24px;
      font-weight: 600;
    }
    .form-group {
      margin-bottom: 18px;
    }
    label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: #374151;
      margin-bottom: 6px;
    }
    .input-wrap {
      position: relative;
    }
    .input-wrap i {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: #9ca3af;
      font-size: 15px;
    }
    input {
      width: 100%;
      padding: 12px 12px 12px 40px;
      border: 1.5px solid #e2e8f0;
      border-radius: 8px;
      font-size: 14px;
      font-family: 'Inter', sans-serif;
      transition: border-color 0.2s;
      outline: none;
    }
    input:focus { border-color: #2563eb; }
    .btn {
      width: 100%;
      padding: 13px;
      background: #f97316;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      font-family: 'Inter', sans-serif;
      margin-top: 8px;
    }
    .btn:hover { background: #ea6c0a; }
    .btn:active { transform: scale(0.98); }
    .btn:disabled { background: #94a3b8; cursor: not-allowed; }
    .forgot-link {
      text-align: center;
      margin-top: 16px;
    }
    .forgot-link a {
      color: #2563eb;
      font-size: 13px;
      text-decoration: none;
      cursor: pointer;
    }
    .forgot-link a:hover { text-decoration: underline; }
    .msg {
      padding: 12px 14px;
      border-radius: 8px;
      font-size: 13px;
      margin-bottom: 16px;
      display: none;
    }
    .msg.error { background: #fef2f2; color: #dc2626; border: 1px solid #fecaca; display: block; }
    .msg.success { background: #f0fdf4; color: #16a34a; border: 1px solid #bbf7d0; display: block; }
    .panel { display: none; }
    .panel.active { display: block; }
    .back-link {
      text-align: center;
      margin-top: 16px;
    }
    .back-link a {
      color: #64748b;
      font-size: 13px;
      text-decoration: none;
      cursor: pointer;
    }
    .back-link a:hover { color: #0A2540; }
    .reset-code-display {
      background: #f0fdf4;
      border: 2px solid #10b981;
      border-radius: 8px;
      padding: 16px;
      text-align: center;
      margin-bottom: 18px;
      display: none;
    }
    .reset-code-display p { font-size: 13px; color: #374151; margin-bottom: 8px; }
    .reset-code-display strong { font-size: 28px; letter-spacing: 6px; color: #10b981; }
    .spinner {
      display: inline-block;
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<div class="login-card">
  <div class="login-logo">
    <img src="images/logo.png" alt="YaseerTech" onerror="this.style.display='none'"/>
    <h1>YaseerTech</h1>
    <p>Business Management System</p>
  </div>

  <!-- LOGIN PANEL -->
  <div class="panel active" id="panelLogin">
    <h2>Sign In</h2>
    <div class="msg" id="loginMsg"></div>
    <div class="form-group">
      <label>Email Address</label>
      <div class="input-wrap">
        <i class="fas fa-envelope"></i>
        <input type="email" id="loginEmail" placeholder="your@email.com" autocomplete="email"/>
      </div>
    </div>
    <div class="form-group">
      <label>Password</label>
      <div class="input-wrap">
        <i class="fas fa-lock"></i>
        <input type="password" id="loginPwd" placeholder="Enter password" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()"/>
      </div>
    </div>
    <button class="btn" id="loginBtn" onclick="doLogin()">Sign In</button>
    <div class="forgot-link">
      <a onclick="showPanel('panelForgot')">Forgot your password?</a>
    </div>
  </div>

  <!-- FORGOT PASSWORD PANEL -->
  <div class="panel" id="panelForgot">
    <h2>Reset Password</h2>
    <div class="msg" id="forgotMsg"></div>
    <div id="forgotStep1">
      <div class="form-group">
        <label>Your Email Address</label>
        <div class="input-wrap">
          <i class="fas fa-envelope"></i>
          <input type="email" id="forgotEmail" placeholder="your@email.com"/>
        </div>
      </div>
      <button class="btn" onclick="sendResetCode()">Send Reset Code</button>
    </div>
    <div id="forgotStep2" style="display:none">
      <div class="reset-code-display" id="codeDisplay">
        <p>Your reset code (write it down):</p>
        <strong id="codeShow"></strong>
      </div>
      <div class="form-group">
        <label>Enter Reset Code</label>
        <div class="input-wrap">
          <i class="fas fa-key"></i>
          <input type="text" id="resetCode" placeholder="6-digit code" maxlength="6"/>
        </div>
      </div>
      <div class="form-group">
        <label>New Password</label>
        <div class="input-wrap">
          <i class="fas fa-lock"></i>
          <input type="password" id="resetNewPwd" placeholder="New password (min 6 chars)"/>
        </div>
      </div>
      <div class="form-group">
        <label>Confirm New Password</label>
        <div class="input-wrap">
          <i class="fas fa-lock"></i>
          <input type="password" id="resetConfirmPwd" placeholder="Confirm new password"/>
        </div>
      </div>
      <button class="btn" onclick="doReset()">Reset Password</button>
    </div>
    <div class="back-link">
      <a onclick="showPanel('panelLogin')">← Back to Login</a>
    </div>
  </div>

</div>

<script>
  const SUPABASE_URL = "https://winlgtflhwiaraniwpts.supabase.co";
  const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndpbmxndGZsaHdpYXJhbml3cHRzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkxODUzMjUsImV4cCI6MjA5NDc2MTMyNX0.Co0PPWjMtNeIIa8GSqkulgytzhwbm33p718HsPMECKU";
  const API = SUPABASE_URL + "/rest/v1";
  let generatedCode = null;
  let resetUserId = null;

  async function sb(path, opts = {}) {
    const res = await fetch(API + path, {
      ...opts,
      headers: {
        "Content-Type": "application/json",
        "apikey": SUPABASE_KEY,
        "Authorization": "Bearer " + SUPABASE_KEY,
        "Prefer": "return=representation",
        ...(opts.headers || {})
      }
    });
    const text = await res.text();
    if (!res.ok) throw new Error(text);
    return text ? JSON.parse(text) : [];
  }

  function showPanel(id) {
    document.querySelectorAll(".panel").forEach(p => p.classList.remove("active"));
    document.getElementById(id).classList.add("active");
    clearMsgs();
  }

  function clearMsgs() {
    document.querySelectorAll(".msg").forEach(m => { m.className = "msg"; m.textContent = ""; });
  }

  function showMsg(id, text, type) {
    const el = document.getElementById(id);
    el.textContent = text;
    el.className = "msg " + type;
  }

  async function doLogin() {
    const email = document.getElementById("loginEmail").value.trim().toLowerCase();
    const pwd = document.getElementById("loginPwd").value;
    const btn = document.getElementById("loginBtn");

    if (!email || !pwd) { showMsg("loginMsg", "Please enter email and password", "error"); return; }

    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>Signing in...';
    clearMsgs();

    try {
      const users = await sb("/users?email=eq." + encodeURIComponent(email) + "&password=eq." + encodeURIComponent(pwd) + "&status=eq.active&limit=1");
      if (!users.length) {
        showMsg("loginMsg", "Incorrect email or password. Please try again.", "error");
        btn.disabled = false;
        btn.textContent = "Sign In";
        return;
      }
      const user = users[0];
      const perms = user.permissions ? (typeof user.permissions === "string" ? JSON.parse(user.permissions) : user.permissions) : [];
      sessionStorage.setItem("yt_session", JSON.stringify({
        id: user.id, name: user.name, email: user.email,
        role: user.role, permissions: perms
      }));
      window.location.href = "dashboard.html";
    } catch (e) {
      showMsg("loginMsg", "Connection error. Please check your internet and try again.", "error");
      btn.disabled = false;
      btn.textContent = "Sign In";
    }
  }

  async function sendResetCode() {
    const email = document.getElementById("forgotEmail").value.trim().toLowerCase();
    if (!email) { showMsg("forgotMsg", "Please enter your email address", "error"); return; }

    try {
      const users = await sb("/users?email=eq." + encodeURIComponent(email) + "&limit=1");
      if (!users.length) { showMsg("forgotMsg", "No account found with that email address", "error"); return; }

      resetUserId = users[0].id;
      generatedCode = String(Math.floor(100000 + Math.random() * 900000));

      document.getElementById("forgotStep1").style.display = "none";
      document.getElementById("forgotStep2").style.display = "block";
      document.getElementById("codeDisplay").style.display = "block";
      document.getElementById("codeShow").textContent = generatedCode;
      showMsg("forgotMsg", "Code generated. Write it down, then enter it below.", "success");
    } catch (e) {
      showMsg("forgotMsg", "Error: " + e.message, "error");
    }
  }

  async function doReset() {
    const code = document.getElementById("resetCode").value.trim();
    const newPwd = document.getElementById("resetNewPwd").value;
    const confirmPwd = document.getElementById("resetConfirmPwd").value;

    if (!code || !newPwd || !confirmPwd) { showMsg("forgotMsg", "All fields are required", "error"); return; }
    if (code !== generatedCode) { showMsg("forgotMsg", "Incorrect reset code", "error"); return; }
    if (newPwd !== confirmPwd) { showMsg("forgotMsg", "Passwords do not match", "error"); return; }
    if (newPwd.length < 6) { showMsg("forgotMsg", "Password must be at least 6 characters", "error"); return; }

    try {
      await sb("/users?id=eq." + resetUserId, { method: "PATCH", body: JSON.stringify({ password: newPwd }) });
      showMsg("forgotMsg", "✅ Password reset successfully! You can now login.", "success");
      document.getElementById("codeDisplay").style.display = "none";
      setTimeout(() => showPanel("panelLogin"), 2500);
    } catch (e) {
      showMsg("forgotMsg", "Error resetting password: " + e.message, "error");
    }
  }
</script>
</body>
</html>
